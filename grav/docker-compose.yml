
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: farmerspride-dev
    ports:
      - "8080:80"
    volumes:
      # Mount user/ so theme/template changes are live without rebuild
      - ./user:/var/www/html/user:Z
      - grav-cache:/var/www/html/cache
      - grav-images:/var/www/html/images
      - grav-logs:/var/log
    environment:
      - GRAV_ADMIN_USER=${GRAV_ADMIN_USER:-admin}
      - GRAV_ADMIN_PASS=${GRAV_ADMIN_PASS:-changeme123}
      - GRAV_ADMIN_EMAIL=${GRAV_ADMIN_EMAIL:-admin@agrolink.com.mv}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

volumes:
  grav-cache:
  grav-images:
  grav-logs:
