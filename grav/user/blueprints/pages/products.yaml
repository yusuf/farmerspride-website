title: Products Page
'@extends':
    type: default
    context: blueprints://pages

form:
  fields:
    tabs:
      type: tabs
      active: 1
      fields:

        # ════════════════════════════════════════════════════════
        # TAB 1 — CATEGORIES
        # ════════════════════════════════════════════════════════
        categories_tab:
          type: tab
          title: Categories
          fields:

            section_intro:
              type: section
              title: Page Introduction
              underline: true

            header.intro.heading:
              type: text
              label: Heading
              placeholder: Our Products

            header.intro.body:
              type: textarea
              label: Body Text
              rows: 3

            header.intro.cta:
              type: text
              label: CTA Button Label
              placeholder: Call for Advice

            section_categories:
              type: section
              title: Product Categories
              underline: true
              text: 'Each category becomes a section on the page. Drag to reorder.'

            header.categories:
              type: list
              label: Categories
              style: vertical
              btnLabel: Add Category
              collapsed: true
              collapsible: true
              fields:
                .name:
                  type: text
                  label: Category Name
                  placeholder: 'e.g. Fertilizers'
                  validate:
                    required: true

                .desc:
                  type: textarea
                  label: Description
                  rows: 3
                  placeholder: 'Describe what this category covers...'

                .image:
                  type: pagemediaselect
                  label: Category Image
                  help: 'Upload via the Media tab. Shown on the Products page and on the Home page cards.'
                  preview_images: true

                .subcategories:
                  type: list
                  label: Subcategory Tags
                  btnLabel: Add Tag
                  style: compact
                  fields:
                    .item:
                      type: text
                      label: Tag
                      placeholder: 'e.g. Granular Fertilizers'

                .cta_primary:
                  type: text
                  label: Primary Button Label
                  placeholder: View / Order

                .cta_secondary:
                  type: text
                  label: Secondary Button Label
                  placeholder: Ask for Guidance

                .coming_soon:
                  type: toggle
                  label: Coming Soon
                  highlight: 0
                  default: 0
                  options:
                    1: 'Yes'
                    0: 'No'
                  validate:
                    type: bool

                .coming_soon_notice:
                  type: text
                  label: Coming Soon Notice Text
                  placeholder: 'Coming Soon — Contact us for lead times.'

                .advisory:
                  type: toggle
                  label: Advisory Only (no order button)
                  highlight: 0
                  default: 0
                  options:
                    1: 'Yes'
                    0: 'No'
                  validate:
                    type: bool

        # ════════════════════════════════════════════════════════
        # TAB 2 — PRODUCTS
        # ════════════════════════════════════════════════════════
        products_tab:
          type: tab
          title: Products
          fields:

            section_products_help:
              type: section
              title: Product Listing
              underline: true
              text: 'Add, edit, or remove individual products. Each product is assigned to a category and shown under that category section. Upload product images via the <strong>Media</strong> tab first, then select them here.'

            header.products:
              type: list
              label: Products
              style: vertical
              btnLabel: Add Product
              collapsed: true
              collapsible: true
              fields:
                .name:
                  type: text
                  label: Product Name
                  placeholder: 'e.g. NPK 20-20-20 Fertilizer'
                  validate:
                    required: true

                .category:
                  type: select
                  label: Category
                  placeholder: '— Select Category —'
                  validate:
                    required: true
                  options:
                    Fertilizers: Fertilizers
                    Seeds: Seeds
                    'Plant Protection': 'Plant Protection'
                    'Plants & Landscaping': 'Plants & Landscaping'
                    'Pots & Growing Supplies': 'Pots & Growing Supplies'
                    'Irrigation & Accessories': 'Irrigation & Accessories'
                    'Advisory & Support': 'Advisory & Support'

                .desc:
                  type: textarea
                  label: Description
                  rows: 2
                  placeholder: 'Brief description of the product...'

                .img:
                  type: pagemediaselect
                  label: Product Image
                  help: 'Upload images via the Media tab first, then select here.'
                  placeholder: '— Select image —'

                .price:
                  type: text
                  label: Price
                  placeholder: 'e.g. MVR 150 / bag'

                .available:
                  type: toggle
                  label: In Stock
                  highlight: 1
                  default: 1
                  options:
                    1: 'Yes'
                    0: 'No'
                  validate:
                    type: bool

        # ════════════════════════════════════════════════════════
        # TAB 3 — ADVANCED
        # ════════════════════════════════════════════════════════
        advanced:
          type: tab
          title: Advanced
          fields:

            section_hero:
              type: section
              title: Hero Banner
              underline: true

            header.hero.heading:
              type: text
              label: Heading
              placeholder: Our Products

            header.hero.subheading:
              type: text
              label: Subheading

            header.hero.img:
              type: pagemediaselect
              label: Background Image
              help: 'Upload via Media tab. Leave blank to use default.'

            section_cta:
              type: section
              title: CTA Band
              underline: true

            header.cta_band.heading:
              type: text
              label: Heading

            header.cta_band.body:
              type: text
              label: Body Text

            header.cta_band.cta_call:
              type: text
              label: Call Button Label
              placeholder: Call Now

            header.cta_band.cta_whatsapp:
              type: text
              label: WhatsApp Button Label
              placeholder: WhatsApp

            header.cta_band.img:
              type: pagemediaselect
              label: Background Image
              help: 'Upload via Media tab. Leave blank to use default.'
