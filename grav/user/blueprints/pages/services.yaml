title: Services & Support Page
'@extends':
    type: default
    context: blueprints://pages

form:
  fields:
    tabs:
      type: tabs
      active: 1
      fields:

        # ════════════════════════════════════════════════════════
        # TAB 1 — SERVICES
        # ════════════════════════════════════════════════════════
        services_tab:
          type: tab
          title: Services
          fields:

            section_intro:
              type: section
              title: Page Introduction
              underline: true

            header.intro_heading:
              type: text
              label: Introduction Heading
              placeholder: 'e.g. Practical Support at Every Step'

            header.intro:
              type: textarea
              label: Introduction Text
              rows: 3
              placeholder: 'Our service does not stop at the sale...'

            section_services:
              type: section
              title: Service Cards
              underline: true
              text: 'Each entry appears as a card. Upload an image via the Media tab first, then select it here. If no image is set, a green gradient is shown.'

            header.services_title:
              type: text
              label: Services Section Title
              placeholder: 'Support that goes beyond the sale'

            header.services_subtitle:
              type: textarea
              label: Services Section Subtitle
              rows: 2
              placeholder: 'Every service points customers straight to a phone call or WhatsApp chat.'

            header.services:
              type: list
              label: Services
              style: vertical
              btnLabel: Add Service
              collapsed: true
              collapsible: true
              fields:
                .title:
                  type: text
                  label: Service Title
                  placeholder: 'e.g. Product Guidance'
                  validate:
                    required: true

                .body:
                  type: textarea
                  label: Description
                  rows: 4
                  placeholder: 'Describe what this service covers...'

                .img:
                  type: pagemediaselect
                  label: Card Image (optional)
                  help: 'Upload via Media tab. Shown as the card header image.'

        # ════════════════════════════════════════════════════════
        # TAB 2 — CTA BAND
        # ════════════════════════════════════════════════════════
        cta_tab:
          type: tab
          title: CTA Band
          fields:

            section_cta:
              type: section
              title: Contact Prompt Band
              underline: true
              text: 'The call-to-action band at the bottom of the page.'

            header.contact_prompt.heading:
              type: text
              label: Heading
              placeholder: 'Have a specific requirement?'

            header.contact_prompt.body:
              type: textarea
              label: Body Text
              rows: 2
              placeholder: 'Tell us what you are growing...'

            header.contact_prompt.cta_primary:
              type: text
              label: Call Button Label
              placeholder: Call Us Now

            header.contact_prompt.cta_secondary:
              type: text
              label: WhatsApp Button Label
              placeholder: 'WhatsApp / Viber'

            header.contact_prompt.cta_tertiary:
              type: text
              label: Email Button Label
              placeholder: Email Inquiry

            header.contact_prompt.img:
              type: pagemediaselect
              label: Background Image
              help: 'Upload via Media tab. Leave blank to use default.'

        # ════════════════════════════════════════════════════════
        # TAB 3 — ADVANCED
        # ════════════════════════════════════════════════════════
        advanced:
          type: tab
          title: Advanced
          fields:

            section_hero:
              type: section
              title: Hero Banner
              underline: true

            header.hero.heading:
              type: text
              label: Heading
              placeholder: 'Services & Support'

            header.hero.subheading:
              type: text
              label: Subheading
              placeholder: 'Our service does not stop at the sale.'

            header.hero.img:
              type: pagemediaselect
              label: Background Image
              help: 'Upload via Media tab. Leave blank to use default.'
