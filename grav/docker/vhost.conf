server {
    listen 80;
    server_name _;
    root /var/www/html;
    index index.php index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    # Grav required rewrite rules
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        fastcgi_pass    127.0.0.1:9000;
        fastcgi_index   index.php;
        fastcgi_param   SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include         fastcgi_params;
        fastcgi_read_timeout 300;
    }

    # Block access to Grav internals
    location ~ ^/(\.git|cache|bin|logs|backup|webserver-configs|tmp)/ {
        return 403;
    }
    location ~ /\.ht    { deny all; }
    location ~ /\.git   { deny all; }
    location ~ /\.env   { deny all; }
    location ~ \.yaml$  { deny all; }
    location ~ \.twig$  { deny all; }
    location ~ \.md$    { deny all; }

    # Static assets — long cache
    location ~* \.(ico|css|js|gif|jpg|jpeg|png|svg|woff|woff2|ttf|eot|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    client_max_body_size 32M;
}
